<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>flow</title>
    <meta property="og:url" content="http://127.0.0.1:5500/index.html" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="lesson 10" />
    <meta
      property="og:description"
      content=" lesson about meta tegs and form input element"
    />
    <meta
      property="og:image"
      content="https://raw.githubusercontent.com/slldze/lesson-10-/refs/heads/main/src/img/share.png"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main>
      <footer>
        <div class="container">
          <div class="flex">
            <h1>კონტაქტი</h1>
            <p>
              Lorem Ipsum საბეჭდი და ტიპოგრაფიული ინდუსტრიის უშინაარსო ტექსტია.
              იგი სტანდარტად 1500-იანი წლებიდან იქცა, როდესაც უცნობმა მბეჭდავმა
              ამწყობ დაზგაზე წიგნის საცდელი ეგზემპლარი დაბეჭდა.
            </p>
            <iframe
              class="maps"
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2977.7006899900684!2d44.78681802749633!3d41.726977124088435!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x404472cf14b55a85%3A0x95333816f22c353a!2z4YObL-GDoSDhg6zhg5Thg6Dhg5Thg5fhg5Thg5rhg5g!5e0!3m2!1ska!2sge!4v1775465747116!5m2!1ska!2sge"
              width="400"
              height="250"
              style="border: 0"
              allowfullscreen=""
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
            ></iframe>
            <div class="contact">
              <img class="icon-1" src="src/img/phone.png" alt="mobile icon" />
              <a href="tel:+995 555 444 333">+995 555 444 333</a>
              <img class="icon-2" src="src/img/mail.png" alt="mail icon" />
              <a href="mailto:example@gmail.com">example@gmail.com</a>
            </div>
          </div>
        </div>
        <section class="registration">
          <form>
            <div class="form-group">
              <label for="name"></label>
              <input
                type="text"
                placeholder="სახელი, გვარი"
                id="name"
                required
              />
            </div>
            <div class="form-group">
              <label for="email"></label>
              <input type="email" placeholder="ელ. ფოსტა" id="email" required />
            </div>
            <div class="form-group">
              <label for="tel"></label>
              <input
                type="number"
                placeholder="ტელეფონის ნომერი"
                id="tel"
                min="9"
                required
              />
            </div>
            <div class="form-group">
              <textarea placeholder="შეტყობინება" required></textarea>
            </div>
            <div class="button">
              <button class="btn" type="submit">გაგზავნა</button>
            </div>
          </form>
        </section>
        <section class="last-line-left">
          <div class="last-h5">
            <h5>ყველა უფლება დაცულია</h5>
          </div>
        </section>
        <section class="last-line-right">
          <div class="last">
            <span>დამზადებულია</span>
            <span class="heart">❤️</span>
            <span>-ით</span>
            <img class="logo" src="src/img/footer-logo.png" alt="logo" />
          </div>
        </section>
      </footer>
    </main>
  </body>
</html>
